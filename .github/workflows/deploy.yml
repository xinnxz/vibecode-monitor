# GitHub Actions Workflow: Deploy to GitHub Pages
# 
# Workflow ini otomatis:
# 1. Trigger saat push ke branch 'main'
# 2. Install dependencies (npm ci)
# 3. Build project (npm run build → folder dist/)
# 4. Deploy folder dist/ ke GitHub Pages
#
# Setelah setup, setiap kali kamu push ke main,
# website akan otomatis terupdate di:
# https://xinnxz.github.io/antigravity-hack/

name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  # Bisa juga trigger manual dari tab Actions
  workflow_dispatch:

# Permission yang dibutuhkan untuk deploy ke Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Hanya jalankan 1 deployment pada satu waktu
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
